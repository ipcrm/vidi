name: Deploy docs to GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# One-time manual step: in repo Settings → Pages, set "Source" to
# "GitHub Actions". No other configuration needed — this workflow does the
# rest. Output: ipcrm.github.io/vidi.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
