name: Build & Release

# Triggered on:
#   - push of a `v*` tag → full matrix build + GitHub Release
#   - manual dispatch → matrix build, artifacts only (no release)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write          # create releases
  attestations: write      # SLSA build provenance
  id-token: write          # attestations signing

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # we read git describe for the version

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # --- Version injection -----------------------------------------
      # The three manifests ship with version `0.0.0`. On tag push, we
      # rewrite them to match the tag (or `0.0.0` if we can't derive a
      # semver for some reason, e.g. a manual_dispatch run).
      - name: Derive version from git
        id: version
        shell: bash
        run: |
          RAW="$(git describe --tags --always --dirty 2>/dev/null || echo '0.0.0')"
          STRIPPED="${RAW#v}"
          if [[ "$STRIPPED" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION="${BASH_REMATCH[0]}"
          else
            VERSION="0.0.0"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Patch tauri.conf.json version
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.version = process.env.VERSION;
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            console.log('tauri.conf.json →', j.version);
          "

      - name: Patch package.json version
        shell: bash
        run: pnpm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Patch Cargo.toml version
        shell: bash
        run: |
          sed -i.bak -E 's/^version = "[^"]+"/version = "'"$VERSION"'"/' src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak
          head -5 src-tauri/Cargo.toml

      # --- The actual build ------------------------------------------
      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      # --- Collect platform artifacts --------------------------------
      - name: Upload macOS artifacts
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: vidi-${{ matrix.label }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: vidi-${{ matrix.label }}
          path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: vidi-${{ matrix.label }}
          path: |
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error

  # -----------------------------------------------------------------
  # Publish a GitHub Release — only on tag push, never on manual runs.
  # -----------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts into a single directory
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.app.tar.gz' -o \
            -name '*.deb' -o \
            -name '*.AppImage' -o \
            -name '*.msi' -o \
            -name '*.exe' \
          \) -exec cp {} release/ \;
          ls -la release

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'release/*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
