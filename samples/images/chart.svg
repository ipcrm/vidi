<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240">
  <rect width="480" height="240" fill="#faf7f2"/>

  <!-- Axes -->
  <line x1="60" y1="20" x2="60" y2="200" stroke="#1a1814" stroke-width="1.5"/>
  <line x1="60" y1="200" x2="460" y2="200" stroke="#1a1814" stroke-width="1.5"/>

  <!-- Gridlines -->
  <g stroke="#d8d1c4" stroke-width="0.5" stroke-dasharray="2,2">
    <line x1="60" y1="60" x2="460" y2="60"/>
    <line x1="60" y1="100" x2="460" y2="100"/>
    <line x1="60" y1="140" x2="460" y2="140"/>
  </g>

  <!-- Bars -->
  <g fill="#7a2f14">
    <rect x="90"  y="130" width="32" height="70"/>
    <rect x="150" y="95"  width="32" height="105"/>
    <rect x="210" y="70"  width="32" height="130"/>
    <rect x="270" y="50"  width="32" height="150"/>
    <rect x="330" y="80"  width="32" height="120"/>
    <rect x="390" y="40"  width="32" height="160"/>
  </g>

  <!-- Labels -->
  <g font-family="Iowan Old Style, Georgia, serif" font-size="11" text-anchor="middle" fill="#1a1814">
    <text x="106" y="218">Jan</text>
    <text x="166" y="218">Feb</text>
    <text x="226" y="218">Mar</text>
    <text x="286" y="218">Apr</text>
    <text x="346" y="218">May</text>
    <text x="406" y="218">Jun</text>
  </g>

  <text x="240" y="16" text-anchor="middle" font-family="Iowan Old Style, Georgia, serif" font-size="14" font-style="italic" fill="#1a1814">Monthly throughput (thousands of records)</text>
</svg>
